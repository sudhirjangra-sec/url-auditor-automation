name: Run URL Audit

on:
  push:
    branches:
      - main
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  audit:
    name: Run headless URL audit
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for clean commit

      - name: Download latest URL Auditor Auto EXE
        env:
          GH_TOKEN: ${{ secrets.AUDITOR_REPO_TOKEN }}
        run: |
          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/sudhirjangra/url-auditor-pro/releases/latest" `
            -Headers @{ Authorization = "Bearer $env:GH_TOKEN"; "User-Agent" = "url-auditor-auto" }

          $asset = $release.assets | Where-Object { $_.name -like "URL-Auditor-Auto-*.zip" } | Select-Object -First 1
          if (-not $asset) {
            Write-Error "URL-Auditor-Auto ZIP not found in latest release"
            exit 1
          }

          echo "Downloading $($asset.name) from $($asset.browser_download_url)"
          Invoke-WebRequest `
            -Uri $asset.browser_download_url `
            -Headers @{ Authorization = "Bearer $env:GH_TOKEN"; "User-Agent" = "url-auditor-auto" } `
            -OutFile "auditor.zip"

          Expand-Archive -Path "auditor.zip" -DestinationPath "auditor" -Force
          echo "AUDITOR_DIR=$((Get-Item auditor).FullName)" >> $env:GITHUB_ENV
          echo "EXE extracted to: $(Get-ChildItem auditor)"

      - name: Copy input files to auditor folder
        run: |
          Copy-Item "input.xlsx"               "$env:AUDITOR_DIR\input.xlsx"
          if (Test-Path "url_auditor_config.xml") {
            Copy-Item "url_auditor_config.xml" "$env:AUDITOR_DIR\url_auditor_config.xml"
          }

      - name: Run audit
        run: |
          Set-Location $env:AUDITOR_DIR
          & ".\URL Auditor Auto.exe"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Audit failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Copy output back to repo
        run: |
          # Find the output_* folder created by the audit
          $outputFolder = Get-ChildItem $env:AUDITOR_DIR -Filter "output_*" -Directory | Sort-Object Name | Select-Object -Last 1
          if (-not $outputFolder) {
            Write-Error "No output folder found after audit"
            exit 1
          }
          # Extract date-time suffix from folder name (e.g. output_2026-06-17_11-50-29 -> 2026-06-17_11-50-29)
          $dateTimeSuffix = $outputFolder.Name -replace '^output_', ''

          # Ensure fixed audit_output folder exists in workspace
          $destDir = Join-Path $env:GITHUB_WORKSPACE "audit_output"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null

          # Copy each file into audit_output, prefixing filename with date-time
          Get-ChildItem $outputFolder.FullName -File | ForEach-Object {
            $newName = "${dateTimeSuffix}_$($_.Name)"
            Copy-Item $_.FullName (Join-Path $destDir $newName) -Force
            echo "Copied: $newName"
          }
          echo "DATE_TIME_SUFFIX=$dateTimeSuffix" >> $env:GITHUB_ENV

      - name: Commit output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "audit_output"
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "audit: output_$env:DATE_TIME_SUFFIX"
          git pull --rebase origin main
          git push
