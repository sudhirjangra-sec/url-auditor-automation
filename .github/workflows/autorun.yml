name: Run URL Audit

on:
  push:
    branches:
      - main
    paths:
      - 'input.xlsx'
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  audit:
    name: Run headless URL audit
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Latest Release Info
        id: fetch_release
        env:
          GH_TOKEN: ${{ secrets.AUDITOR_REPO_TOKEN }}
        run: |
          try {
            $release = Invoke-RestMethod `
              -Uri "https://api.github.com/repos/sudhirjangra/url-auditor-pro/releases/latest" `
              -Headers @{ Authorization = "Bearer $env:GH_TOKEN"; "User-Agent" = "url-auditor-auto" }
            
            $asset = $release.assets | Where-Object { $_.name -like "URL-Auditor-Auto-*.zip" } | Select-Object -First 1
            if (-not $asset) { throw "Asset ZIP file not found in the latest release." }

            echo "RELEASE_TAG=$($release.tag_name)" >> $env:GITHUB_ENV
            echo "DOWNLOAD_URL=$($asset.browser_download_url)" >> $env:GITHUB_ENV
            echo "ASSET_NAME=$($asset.name)" >> $env:GITHUB_ENV
            echo "FETCH_SUCCESS=true" >> $env:GITHUB_ENV
          } catch {
            Write-Warning "Could not fetch details from private repo: $_. Will attempt fallback to cached version."
            echo "FETCH_SUCCESS=false" >> $env:GITHUB_ENV
            echo "RELEASE_TAG=fallback" >> $env:GITHUB_ENV
          }

      - name: Cache URL Auditor EXE
        id: cache_auditor
        uses: actions/cache@v4
        with:
          path: auditor
          key: auditor-exe-${{ env.RELEASE_TAG }}
          restore-keys: |
            auditor-exe-

      - name: Download and Extract (Cache Miss)
        if: steps.cache_auditor.outputs.cache-hit != 'true' && env.FETCH_SUCCESS == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUDITOR_REPO_TOKEN }}
        run: |
          echo "Downloading $env:ASSET_NAME..."
          Invoke-WebRequest `
            -Uri $env:DOWNLOAD_URL `
            -Headers @{ Authorization = "Bearer $env:GH_TOKEN"; "User-Agent" = "url-auditor-auto" } `
            -OutFile "auditor.zip"
          Expand-Archive -Path "auditor.zip" -DestinationPath "auditor" -Force
          Remove-Item "auditor.zip"

      - name: Verify Auditor Availability
        run: |
          if (-not (Test-Path "auditor")) {
            Write-Error "Auditor executable could not be found! (API failed and no cached version exists)"
            exit 1
          }
          echo "AUDITOR_DIR=$((Get-Item auditor).FullName)" >> $env:GITHUB_ENV
          echo "Auditor folder ready. Contents:"
          Get-ChildItem auditor

      - name: Copy input files to auditor folder
        run: |
          Copy-Item "input.xlsx"               "$env:AUDITOR_DIR\input.xlsx"
          if (Test-Path "url_auditor_config.xml") {
            Copy-Item "url_auditor_config.xml" "$env:AUDITOR_DIR\url_auditor_config.xml"
          }

      - name: Run audit
        run: |
          Set-Location $env:AUDITOR_DIR
          & ".\URL Auditor Auto.exe"
          $exitCode = $LASTEXITCODE
          echo "AUDIT_EXIT_CODE=$exitCode" >> $env:GITHUB_ENV
          if ($exitCode -ne 0) {
            Write-Warning "Audit exited with code $exitCode - will still attempt to save any partial output"
          }

      - name: Copy output back to repo
        run: |
          $outputFolder = Get-ChildItem $env:AUDITOR_DIR -Filter "output_*" -Directory | Sort-Object Name | Select-Object -Last 1
          if (-not $outputFolder) {
            Write-Warning "No output folder found after audit - skipping copy"
            exit 0
          }
          $dateTimeSuffix = $outputFolder.Name -replace '^output_', ''
          $destDir = Join-Path $env:GITHUB_WORKSPACE "audit_output"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          
          Get-ChildItem $outputFolder.FullName -File | ForEach-Object {
            $newName = "${dateTimeSuffix}_$($_.Name)"
            Copy-Item $_.FullName (Join-Path $destDir $newName) -Force
            echo "Copied: $newName"
          }
          echo "DATE_TIME_SUFFIX=$dateTimeSuffix" >> $env:GITHUB_ENV

      - name: Commit output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "audit_output"
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "audit: output_$env:DATE_TIME_SUFFIX"
          git pull --rebase origin main
          git push

      - name: Fail if audit crashed
        if: ${{ env.AUDIT_EXIT_CODE != '0' && env.AUDIT_EXIT_CODE != '' }}
        run: |
          Write-Error "Audit failed with exit code $env:AUDIT_EXIT_CODE"
          exit 1
